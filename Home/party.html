<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Party Page</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-glow: #00f2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            overflow: hidden;
            transition: background 0.2s;
        }

        /* 1. Dynamic Background */
        .party-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(270deg, #ff0080, #7928ca, #0070f3);
            background-size: 600% 600%;
            animation: moveGradient 8s infinite alternate;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Strobe Class (Toggled via JS) */
        .strobe-active {
            animation: strobeEffect 0.1s steps(2) infinite !important;
        }

        @keyframes strobeEffect {
            from { filter: invert(0); }
            to { filter: invert(1); }
        }

        /* 2. Interactive Card */
        .party-card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary-glow);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 20px var(--primary-glow);
            text-align: center;
            color: white;
            width: 85%;
            max-width: 450px;
        }

        /* 3. New Feature: Visualizer Bars */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 50px;
            gap: 5px;
            margin: 20px 0;
        }

        .bar {
            width: 8px;
            background: var(--primary-glow);
            border-radius: 5px;
            animation: bounce 0.5s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        @keyframes bounce {
            from { height: 10px; }
            to { height: 50px; }
        }

        /* 4. Mobile Button */
        .btn-party {
            background: var(--primary-glow);
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="party-bg" id="bg"></div>

    <div class="party-card">
        <h1>VIP LOUNGE</h1>
        
        <div class="visualizer" id="viz">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
        </div>

        <audio id="player" controls>
            <source src="https://www.dropbox.com/scl/fi/1xmbrk702snvfxyd8md43/BrooklynBloodPop.mp3?rlkey=62ww3ss9nwtns7opcokc3jdwf&st=sp7syuu7&dl=1" type="audio/mpeg">
        </audio>

        <br>
        <button class="btn-party" onclick="toggleStrobe()">TOGGLE STROBE</button>
    </div>

    <script>
        const player = document.getElementById('player');
        const bars = document.querySelectorAll('.bar');
        const bg = document.getElementById('bg');

        // Feature: Link visualizer to play state
        player.onplay = () => {
            bars.forEach(bar => bar.style.animationPlayState = 'running');
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
        };

        player.onpause = () => {
            bars.forEach(bar => bar.style.animationPlayState = 'paused');
        };

        // Feature: Strobe Toggle
        function toggleStrobe() {
            bg.classList.toggle('strobe-active');
        }
    </script>
</body>
</html>
