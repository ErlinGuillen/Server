<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="getCellIndex.js"></script>
	<script src="createBoard.js"></script>
	<script src="rollSticks.js"></script>
	<script src="movePiece.js"></script>
	<script src="checkWin.js"></script>
	<script src="resetGame.js"></script>
	<script src="toggleMusic.js"></script>
	<script src="addToLog.js"></script>
    <title>Ancient Egyptian Senet</title>
    <style>
        :root {
            --board-color: #d2b48c;
            --cell-border: #8b4513;
            --p1-color: #2c3e50;
            --p2-color: #e74c3c;
        }

        body {
            background-color: #222;
            color: #f0e68c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* The Board Grid */
        #board {
            display: grid;
            grid-template-columns: repeat(10, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            background-color: var(--cell-border);
            padding: 10px;
            border: 8px solid #5d2e0a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: var(--board-color);
            border: 1px solid var(--cell-border);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-size: 10px;
            color: rgba(0,0,0,0.3);
        }

        /* Special Squares */
        .special { background-color: #c4a484; font-weight: bold; color: #5d2e0a; }
        .house-of-happiness { background-color: #ffd700; } /* Sq 26 */
        .water { background-color: #3498db; }             /* Sq 27 */

        /* Pieces */
        .piece {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }
        .p1 { background-color: var(--p1-color); border: 3px solid #1a252f; }
        .p2 { background-color: var(--p2-color); border: 3px solid #c0392b; border-radius: 5px; } /* Squares vs Circles */

        .controls {
            text-align: center;
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #8b4513;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:disabled { background: #555; }

        #status { font-size: 1.2rem; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Senet</h1>
    <div id="status">Player 1's Turn</div>

    <div id="game-container" style="display: flex; flex-direction: row; align-items: flex-start; gap: 30px;">
    <div>
        <div id="board"></div>
        <div class="controls">
            <div id="roll-result">Roll: -</div>
            <button id="roll-btn" onclick="rollSticks()">Throw Sticks</button>
            <hr>
            <button onclick="toggleMusic()">🎵 Toggle Music</button>
        </div>
    </div>

    <div id="history-log" style="background: #333; padding: 15px; border-radius: 10px; width: 200px; height: 400px; overflow-y: auto; border: 2px solid #8b4513;">
        <h3 style="margin-top: 0; color: #ffd700; border-bottom: 1px solid #8b4513;">Move History</h3>
        <ul id="log-list" style="list-style: none; padding: 0; font-size: 0.9rem; color: #f0e68c;">
            <li>Game started...</li>
        </ul>
   </div>
</div>

    <audio id="bg-music" loop>
        <source src="https://www.dropbox.com/scl/fi/1xmbrk702snvfxyd8md43/BrooklynBloodPop.mp3?rlkey=62ww3ss9nwtns7opcokc3jdwf&st=z44xhdvt&dl=1" type="audio/mpeg">
    </audio>
    <audio id="sfx-move">
       <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

<script>
    // DOM Elements
    const boardElement = document.getElementById('board');
    const statusElement = document.getElementById('status');
    const rollResultElement = document.getElementById('roll-result');
    const moveSfx = document.getElementById('sfx-move');
    const bgMusic = document.getElementById('bg-music');
    // FIX: Define the missing rollBtn reference
    const rollBtn = document.getElementById('roll-btn'); 

    // Global Game State
    let currentPlayer = 1;
    let lastRoll = 0;
    let hasRolled = false;
    let gameState = Array(31).fill(0); 

    // Initial Setup: Alternating pieces on the first 10 squares
    for(let i=1; i<=10; i++) {
        gameState[i] = (i % 2 === 0) ? 2 : 1;
    }
    // Ensure the board draws only after all external scripts load
    window.onload = () => {
        createBoard();
    };
</script>
	
</body>
</html>
