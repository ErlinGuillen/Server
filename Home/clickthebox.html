<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,200;1,200&display=swap" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="logo.png">
<link rel="stylesheet" href="mystyle.css">

<title>Click the Box</title>

<style>

.mycontainer2{
  display:flex;
}

div.mycontainer2 > .navigator{
  width:100%;
  float:left;
}

main{
  text-align:center;
  font-family:Arial;
}

#gameArea{
  width:500px;
  height:400px;
  border:2px solid white;
  margin:auto;
  position:relative;
}

#box{
  width:50px;
  height:50px;
  background:red;
  position:absolute;
  cursor:pointer;
}

</style>
</head>

<body>

<header style="text-align:left; padding-top:10px">
<img src="logo.png" width="50" height="50">
<hr class="hrlogo">
<h1 class="sidelogo">Click a box!</h1>
</header>

<nav>
<div class="mycontainer2">
<a href="https://erlinguillen.github.io/Server/Home/version.html" class="navigator">Back</a>
</div>
</nav>

<main>

<h1>Click the Box Game</h1>
<p>Score: <span id="score">0</span></p>

<div id="gameArea">
<div id="box"></div>
</div>

<!-- Background Music -->
<audio id="bgMusic" autoplay loop>
<source src="wonderfulday.mp3" type="audio/mpeg">
</audio>

<!-- Click Sound -->
<audio id="clickSound">
<source src="lobotomy.mp3" type="audio/mpeg">
</audio>

</main>

<footer>
<p id="version"></p>
</footer>

<script>

let score = 0;
const box = document.getElementById("box");
const clickSound = document.getElementById("clickSound");

function moveBox(){

let x = Math.random() * 450;
let y = Math.random() * 350;

box.style.left = x + "px";
box.style.top = y + "px";

}

box.onclick = function(){

clickSound.play();

score++;
document.getElementById("score").textContent = score;

moveBox();

};

moveBox();

</script>

<script src="myscript.js"></script>

</body>
</html>
