<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,200;1,200&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="logo.png">
<link rel="stylesheet" href="mystyle.css">
    <title>Click the Box!</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #box {
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            top: 200px;
            left: 200px;
            cursor: pointer;
        }
    </style>
</head>
<body>
  <header style="text-align: left; padding-top: 10px">
	 <img src="logo.png" alt="Logo" width="50px" height="50px" class="logo">
	 <hr class="hrlogo">
     <h1 class="sidelogo">Click the Box!</h1>
  </header>
  <nav>
  <ul>
     <li><a href="https://erlinguillen.github.io/Server/Home/version.html">Back</a></li>
  </ul>
  </nav>
    <h1>Click the Box!</h1>
    <p>Score: <span id="score">0</span></p>
    <p>Time Left: <span id="time">10</span></p>
    <div id="box"></div>
    <br>
    <button id="restartBtn">Restart Game</button>
<script>
    let score = 0;
    let timeLeft = 10;
    let timer;

    let box = document.getElementById("box");
    let restartBtn = document.getElementById("restartBtn");

    startGame();

    function startGame() {
        score = 0;
        timeLeft = 10;

        document.getElementById("score").innerText = score;
        document.getElementById("time").innerText = timeLeft;

        box.style.display = "block";
        restartBtn.style.display = "none";

        timer = setInterval(countdown, 1000);
    }

    box.onclick = function() {
        if (timeLeft > 0) {
            score++;
            document.getElementById("score").innerText = score;

            moveBox();
        }
    };

    function moveBox() {
        // Get full screen size
        let maxX = window.innerWidth - box.offsetWidth;
        let maxY = window.innerHeight - box.offsetHeight;

        let x = Math.random() * maxX;
        let y = Math.random() * maxY;

        box.style.left = x + "px";
        box.style.top = y + "px";
    }

    function countdown() {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(timer);
            box.style.display = "none";
            restartBtn.style.display = "inline-block";
        }
    }

    restartBtn.onclick = function() {
        clearInterval(timer);
        startGame();
    };
</script>
</body>
</html>
