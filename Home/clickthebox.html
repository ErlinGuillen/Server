<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click the Box Game</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
  }

  #game-container {
    position: relative;
    width: 500px;
    height: 400px;
    margin: 50px auto;
    border: 2px solid #333;
    background-color: #f0f0f0;
    overflow: hidden;
  }

  .box {
    position: absolute;
    width: 50px;
    height: 50px;
    background-color: red;
    cursor: pointer;
    border-radius: 8px;
  }

  #scoreboard {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
  }

  #start-btn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Click the Box Game!</h1>
<button id="start-btn">Start Game</button>
<div id="game-container"></div>
<div id="scoreboard">Score: 0</div>

<script>
const gameContainer = document.getElementById('game-container');
const scoreboard = document.getElementById('scoreboard');
const startBtn = document.getElementById('start-btn');

let score = 0;
let gameInterval;
let boxExists = false;

function createBox() {
    if (boxExists) return; // Only one box at a time
    const box = document.createElement('div');
    box.classList.add('box');

    // Random position inside container
    const maxX = gameContainer.clientWidth - 50;
    const maxY = gameContainer.clientHeight - 50;
    const x = Math.floor(Math.random() * maxX);
    const y = Math.floor(Math.random() * maxY);

    box.style.left = x + 'px';
    box.style.top = y + 'px';

    gameContainer.appendChild(box);
    boxExists = true;

    // Click event
    box.addEventListener('click', () => {
        score++;
        scoreboard.textContent = `Score: ${score}`;
        box.remove();
        boxExists = false;
    });

    // Remove box after 1.5 seconds if not clicked
    setTimeout(() => {
        if (boxExists) {
            box.remove();
            boxExists = false;
        }
    }, 1500);
}

// Start game
startBtn.addEventListener('click', () => {
    score = 0;
    scoreboard.textContent = `Score: ${score}`;
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(createBox, 1000);
});
</script>
</body>
</html>
