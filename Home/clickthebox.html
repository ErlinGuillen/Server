<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,200;1,200&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="logo.png">
<link rel="stylesheet" href="mystyle.css">
<title>Click the Box</title>
<style>
  .mycontainer2{
	display: flex;
  }
  div.mycontainer2 > .navigator{
    width: 100%;
	float:left;
  }
  main{
	font-family: Arial;
    text-align: center;
  }

  #gameArea{
    width: 600px;
    height: 400px;
    border: 3px solid white;
    margin: auto;
    position: relative;
  }

  #box{
    width: 50px;
    height: 50px;
    background: red;
    position: absolute;s
    cursor: pointer;
  }	
</style>
</head>
<body>
<header style="text-align: left; padding-top: 10px">
  <img src="logo.png" alt="Logo" width="50px" height="50px" class="logo">
  <hr class="hrlogo">
  <h1 class="sidelogo">Click a box!</h1>
</header>
  <nav>
	<div class="mycontainer2">
    <a href="https://erlinguillen.github.io/Server/Home/version.html" class="navigator">Back</a>
	</div>
  </nav>
<main>
<h1>Click the Box Game</h1>
<h2>Score: <span id="score">0</span></h2>

<div id="gameArea">
<div id="box"></div>
</div>
</main>
  <footer>
	  <p id="version"></p>
  </footer>
<script>

let score = 0;
let box = document.getElementById("box");
let gameArea = document.getElementById("gameArea");

function moveBox(){
    let x = Math.random() * (gameArea.clientWidth - 50);
    let y = Math.random() * (gameArea.clientHeight - 50);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

box.onclick = function(){
    score++;
    document.getElementById("score").innerText = score;
    moveBox();
}

moveBox();

</script>
<script src="myscript.js"></script>
</body>
</html>
