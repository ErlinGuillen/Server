<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,200;1,200&display=swap" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="logo.png">
<link rel="stylesheet" href="mystyle.css">

<title>Click the Box</title>

<style>

.mycontainer2{
  display:flex;
}

div.mycontainer2 > .navigator{
  width:100%;
  float:left;
}

main{
  text-align:center;
  font-family:Arial;
}

#gameArea{
  width:500px;
  height:400px;
  border:2px solid white;
  margin:auto;
  position:relative;
}

#box{
  width:50px;
  height:50px;
  background:red;
  position:absolute;
  cursor:pointer;
}

</style>
</head>

<body>

<header style="text-align:left; padding-top:10px">
<img src="logo.png" width="50" height="50">
<hr class="hrlogo">
<h1 class="sidelogo">Click a box!</h1>
</header>

<nav>
<div class="mycontainer2">
<a href="https://erlinguillen.github.io/Server/Home/version.html" class="navigator">Back</a>
</div>
</nav>

<main>

<h1>Click the Box!</h1>
  
<button id="startBtn">Start Game</button>

<p>
Difficulty:
<select id="difficulty">
  <option value="1200">Easy</option>
  <option value="800">Medium</option>
  <option value="400">Hard</option>
</select>
</p>

<p>Time: <span id="time">30</span></p>

<!-- Background Music -->
<audio id="bgMusic" autoplay loop>
<source src="Wonderful Day.mp3" type="audio/mpeg">
</audio>

<!-- Click Sound -->
<audio id="clickSound">
<source src="lobotomy.mp3" type="audio/mpeg">
</audio>

</main>

<footer>
<p id="version"></p>
</footer>

<script>
let score = 0;
let time = 30;
let gameInterval;
let timerInterval;

const box = document.getElementById("box");
const clickSound = document.getElementById("clickSound");
const bgMusic = document.getElementById("bgMusic");
const startBtn = document.getElementById("startBtn");
const difficulty = document.getElementById("difficulty");
const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const gameArea = document.getElementById("gameArea");

// Allow background music after first click
document.body.addEventListener("click", function() {
  bgMusic.play();
}, { once: true });

// Move box to a random position
function moveBox() {
  const maxX = gameArea.clientWidth - box.offsetWidth;
  const maxY = gameArea.clientHeight - box.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  box.style.left = x + "px";
  box.style.top = y + "px";
}

// Click on box
box.onclick = function() {
  clickSound.play();
  score++;
  scoreDisplay.textContent = score;
  moveBox();
}

// Start Game
startBtn.onclick = function() {
  score = 0;
  time = 30;
  scoreDisplay.textContent = score;
  timeDisplay.textContent = time;

  moveBox();

  // Clear previous intervals
  clearInterval(gameInterval);
  clearInterval(timerInterval);

  // Move box automatically based on difficulty
  const speed = parseInt(difficulty.value);
  gameInterval = setInterval(moveBox, speed);

  // Timer countdown
  timerInterval = setInterval(() => {
    time--;
    timeDisplay.textContent = time;

    if(time <= 0){
      clearInterval(timerInterval);
      clearInterval(gameInterval);
      alert("Game Over! Score: " + score);
    }
  }, 1000);
}
</script>
<script src="myscript.js"></script>
</body>
</html>
