<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<script src="draw.js"></script>
	<script src="update.js"></script>
	<script src="particles.js"></script>
    <title>Square Dodger Pro</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #333; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .info { position: absolute; top: 20px; font-size: 24px; }
    </style>
</head>
<body>

    <div class="info">Score: <span id="score">0</span> | High: <span id="highScore">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script src="draw.js"></script>
    <script src="update.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreUI = document.getElementById("score");
        const highUI = document.getElementById("highScore");

        // Game State
        let score = 0;
        let highScore = localStorage.getItem("dodgerHighScore") || 0;
        let gameState = "START"; 
        let hasShield = false;

        // Objects
        const player = { x: 185, y: 530, size: 30, speed: 7, color: "#0095DD" };
        let enemies = [];
        let powerUps = [];
        const keys = {};

        highUI.innerText = highScore;

        // Input Handling
        window.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "Space" && gameState !== "PLAYING") resetGame();
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function resetGame() {
            score = 0;
            scoreUI.innerText = score;
            hasShield = false;
            enemies = [{ x: Math.random() * 370, y: -30, size: 30, speed: 4 }];
            powerUps = [];
            gameState = "PLAYING";
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * (canvas.width - 30),
                y: -30,
                size: 30,
                speed: 3 + Math.random() * 4
            });
        }

        function spawnPowerUp() {
            powerUps.push({ x: Math.random() * 380, y: -20, size: 20, speed: 2 });
        }

        function gameOver() {
            gameState = "OVER";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dodgerHighScore", highScore);
                highUI.innerText = highScore;
            }
        }

        function drawText(txt, size, y) {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = size + "px Arial";
            ctx.fillText(txt, canvas.width/2, y);
        }

        // The Engine
        function loop() {
            update(); // From update.js
            draw();   // From draw.js
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
