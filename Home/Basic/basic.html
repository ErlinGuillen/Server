<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Square Dodger Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟦</text></svg>">
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <div class="info">
        Score: <span id="score">0</span> | High: <span id="highScore">0</span>
        <div class="controls">
            Volume: <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
        </div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script src="particles.js"></script>
    <script src="sound.js"></script>
    <script src="draw.js"></script>
    <script src="gameover.js"></script>
    <script src="resetgame.js"></script>
    <script src="update.js"></script>
    <script src="spawnenemy.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreUI = document.getElementById("score");
        const highUI = document.getElementById("highScore");

        // Global Game State
        let score = 0;
        let level = 1;
        let highScore = localStorage.getItem("dodgerHighScore") || 0;
        let gameState = "START"; 
        let hasShield = false;
        let isSlowMo = false;

        const player = { x: 185, y: 530, size: 30, speed: 7, color: "#0095DD" };
        let enemies = [];
        let powerUps = [];
        const keys = {};

        highUI.innerText = highScore;

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                if (document.activeElement !== document.getElementById("volumeSlider") && gameState !== "PLAYING") {
                    resetGame();
                }
            }
            keys[e.code] = true;
        });

        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnPowerUp() {
            const type = Math.random() > 0.5 ? "shield" : "slowmo";
            powerUps.push({ 
                x: Math.random() * 380, 
                y: -20, 
                size: 20, 
                speed: 2, 
                type: type 
            });
        }

        function drawText(txt, size, y) {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = size + "px Arial";
            ctx.fillText(txt, canvas.width/2, y);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
